# ============================================================
# Agent & 工具链配置
# ============================================================

# --- AgentExecutor ---
agent_max_iterations: 5              # Agent 最大推理步数(单轮对话中调用全部工具的总次数)

# --- 工具调用限制 (单轮对话中每种工具最大调用次数) ---
tool_call_limits:
  knowledge_search: 3                # 知识库检索
  web_search: 2                      # 联网搜索
  summarize_document: 2              # 文档摘要

# --- 工具配置 ---
knowledge_search_max_chars: 300      # knowledge_search 单文档截断字符数(rerank召回的每个chunk进行截取只保留设定的值)
summarize_min_chars: 500             # summarize_document 触发摘要最小长度(召回的总chunk大小超过阈值进行摘要总结)
